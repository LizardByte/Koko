---
app-id: dev.lizardbyte.app.Koko
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
add-build-extensions:
  org.freedesktop.Sdk.Extension.node24:
    directory: lib/sdk/node24
    version: "25.08"
    no-autodownload: true
    autodelete: false
command: koko
separate-locales: false

finish-args:
  - --filesystem=home
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /lib/*.la
  - /lib/*.a
  - /share/man

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - modules/xdotool.json

  - name: koko
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin
      env:
        BUILD_VERSION: "@BUILD_VERSION@"
        CARGO_HOME: /run/build/koko/cargo
        CARGO_NET_OFFLINE: "true"
        LD_LIBRARY_PATH: /app/lib
        LIBRARY_PATH: /app/lib
        npm_config_cache: /run/build/koko/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node24
        npm_config_offline: "true"
        NPM_CONFIG_LOGLEVEL: info
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig
        XDG_CACHE_HOME: /run/build/koko/flatpak-node/cache
    build-commands:
      - install -Dm0644 cargo/config .cargo/config.toml
      - cd crates/client-web && npm ci --offline --ignore-scripts && npm run build
      - cargo build --offline --locked --release
      - install -Dm0755 target/release/koko /app/libexec/koko/koko
      - install -Dm0755 packaging/linux/flatpak/scripts/koko.sh /app/bin/koko
      - install -dm0755 /app/share/koko
      - cp -a crates/client-web/dist /app/share/koko/client-web
      - install -Dm0644 assets/Koko.svg /app/share/icons/hicolor/scalable/apps/dev.lizardbyte.app.Koko.svg
      - >-
        install -Dm0644
        packaging/linux/flatpak/dev.lizardbyte.app.Koko.desktop
        /app/share/applications/dev.lizardbyte.app.Koko.desktop
      - >-
        install -Dm0644
        packaging/linux/flatpak/dev.lizardbyte.app.Koko.metainfo.xml
        /app/share/metainfo/dev.lizardbyte.app.Koko.metainfo.xml
    sources:
      - type: git
        url: "@GITHUB_CLONE_URL@"
        commit: "@GITHUB_COMMIT@"
      - type: file
        path: dev.lizardbyte.app.Koko.metainfo.xml
        dest: packaging/linux/flatpak
      - generated-node-sources.json
      - generated-cargo-sources.json
