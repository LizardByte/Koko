---
name: CI-macOS-DMG
permissions: {}

on:
  workflow_call:
    inputs:
      publish_release:
        required: true
        type: string
      release_version:
        required: true
        type: string
    secrets:
      # email address
      APPLE_ID:
        required: false
      # 10-character Team ID
      APPLE_TEAM_ID:
        required: false
      # app-specific password in APPLE_ID's account that must be named "notarytool"
      # https://support.apple.com/en-us/102654
      APPLE_NOTARYTOOL_PASSWORD:
        required: false
      # Developer ID Application: Full Name (TEAMIDHERE)
      APPLE_CODESIGN_IDENTITY:
        required: false
      # pkcs12 export from Xcode in base64
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64:
        required: false
      # pkcs12 password added by Xcode export
      APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_PASSWORD:
        required: false

env:
  CARGO_TERM_COLOR: always
  INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
  MACOSX_DEPLOYMENT_TARGET: 14.2

jobs:
  build_dmg:
    name: ${{ matrix.name }}
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    outputs:
      notarytool_submission_id_arm64: ${{ steps.notarize_submit.outputs.submission_id_arm64 }}
      notarytool_submission_id_x86_64: ${{ steps.notarize_submit.outputs.submission_id_x86_64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            arch: arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            name: macOS-x86_64
            arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Install Apple certificate
        if: inputs.publish_release == 'true'
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466  # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_PASSWORD }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Download macOS build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-macos-${{ matrix.target }}
          path: .

      - name: Package DMG
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          SHOULD_SIGN: ${{ inputs.publish_release }}
        run: |
          sign_args=()
          if [[ "${SHOULD_SIGN}" == "true" ]]; then
            sign_args+=(--sign)
          fi

          bash packaging/macos/package-dmg.sh \
            --target "${{ matrix.target }}" \
            --version "${INPUT_RELEASE_VERSION:-0.0.0}" \
            --binary "target/${{ matrix.target }}/release/koko" \
            --output-dir artifacts \
            "${sign_args[@]}"

      - name: Submit for notarization
        id: notarize_submit
        if: inputs.publish_release == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [[ -n "${APPLE_NOTARYTOOL_PASSWORD}" ]]; then
            submission_id=$(xcrun notarytool submit "artifacts/koko-${MATRIX_TARGET}.dmg" \
              --apple-id "${APPLE_ID}" \
              --team-id "${APPLE_TEAM_ID}" \
              --password "${APPLE_NOTARYTOOL_PASSWORD}" \
              --output-format json \
              | jq -r '.id')
            echo "Submission ID: ${submission_id}"
            echo "submission_id_${MATRIX_ARCH}=${submission_id}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set artifact prefix
        id: artifact_prefix
        env:
          INPUTS_PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          if [[ "${INPUTS_PUBLISH_RELEASE}" == "true" ]]; then
            echo "prefix=unsigned" >> "${GITHUB_OUTPUT}"
          else
            echo "prefix=koko" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: error
          name: ${{ steps.artifact_prefix.outputs.prefix }}-${{ matrix.name }}-dmg
          path: artifacts/

  notarize_dmg:
    name: Notarize ${{ matrix.name }}
    needs: build_dmg
    if: inputs.publish_release == 'true'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            arch: arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            name: macOS-x86_64
            arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Install Apple certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466  # v7.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_PASSWORD }}

      - name: Download DMG artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: unsigned-${{ matrix.name }}-dmg
          path: artifacts

      - name: Wait for notarization and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          MATRIX_TARGET: ${{ matrix.target }}
          SUBMISSION_ID: ${{ matrix.arch == 'arm64'
            && needs.build_dmg.outputs.notarytool_submission_id_arm64
            || needs.build_dmg.outputs.notarytool_submission_id_x86_64 }}
        run: |
          if [[ -z "${SUBMISSION_ID}" ]]; then
            echo "No submission ID found; skipping notarization wait."
            exit 0
          fi

          echo "Polling notarization status for submission: ${SUBMISSION_ID}"
          while true; do
            status=$(xcrun notarytool info "${SUBMISSION_ID}" \
              --apple-id "${APPLE_ID}" \
              --team-id "${APPLE_TEAM_ID}" \
              --password "${APPLE_NOTARYTOOL_PASSWORD}" \
              --output-format json \
              | jq -r '.status')
            echo "Current status: ${status}"
            if [[ "${status}" == "Accepted" ]]; then
              echo "Notarization accepted."
              break
            elif [[ "${status}" == "Invalid" || "${status}" == "Rejected" ]]; then
              echo "Notarization failed with status: ${status}"
              xcrun notarytool log "${SUBMISSION_ID}" \
                --apple-id "${APPLE_ID}" \
                --team-id "${APPLE_TEAM_ID}" \
                --password "${APPLE_NOTARYTOOL_PASSWORD}"
              exit 1
            fi
            echo "Status is '${status}', waiting 30 seconds before retrying..."
            sleep 30
          done

          xcrun stapler staple -v "artifacts/koko-${MATRIX_TARGET}.dmg"

      - name: Upload stapled artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: error
          name: koko-${{ matrix.name }}-dmg
          path: artifacts/
