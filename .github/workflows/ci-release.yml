---
name: CI-Release
permissions: {}

on:
  workflow_call:
    inputs:
      release_body:
        required: true
        type: string
      release_generate_release_notes:
        required: true
        type: string
      release_tag:
        required: true
        type: string
    secrets:
      GH_BOT_TOKEN:
        required: true

jobs:
  release:
    name: Release
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: koko-*
          merge-multiple: true

      - name: Debug artifacts
        run: ls -l artifacts

      - name: Create/Update GitHub Release
        uses: LizardByte/actions/actions/release_create@a46850981292c4bbc0c41715f286ad95adaaaf4a  # v2026.625.20301
        with:
          allowUpdates: true
          body: ${{ inputs.release_body }}
          draft: true
          generateReleaseNotes: ${{ inputs.release_generate_release_notes }}
          name: ${{ inputs.release_tag }}
          prerelease: true
          tag: ${{ inputs.release_tag }}
          token: ${{ secrets.GH_BOT_TOKEN }}
