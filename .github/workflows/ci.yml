---
name: CI
permissions: {}

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  setup_release:
    name: Setup Release
    outputs:
      publish_release: ${{ steps.setup_release.outputs.publish_release }}
      release_body: ${{ steps.setup_release.outputs.release_body }}
      release_commit: ${{ steps.setup_release.outputs.release_commit }}
      release_generate_release_notes: ${{ steps.setup_release.outputs.release_generate_release_notes }}
      release_tag: ${{ steps.setup_release.outputs.release_tag }}
      release_version: ${{ steps.setup_release.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Release
        id: setup_release
        uses: LizardByte/actions/actions/release_setup@200eaeb897a2b065a65cb6f16b41077432007490  # v2026.605.34721
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  dependency_policy:
    name: Dependency Policy
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7  # v1.16.0
        with:
          cache: true
          cache-on-failure: false

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check licenses
        run: cargo deny check licenses

  clippy:
    name: Clippy
    permissions:
      contents: read
    uses: ./.github/workflows/ci-clippy.yml

  test:
    name: Test
    permissions:
      contents: read
    uses: ./.github/workflows/ci-rust.yml
    with:
      job_name: Test
      run_build: false
      run_tests: true

  build:
    name: Build
    needs: setup_release
    permissions:
      contents: read
    uses: ./.github/workflows/ci-rust.yml
    with:
      job_name: Build
      release_version: ${{ needs.setup_release.outputs.release_version }}
      run_build: true
      run_tests: false

  build_windows_installer:
    name: Build Windows Installer
    needs:
      - setup_release
      - build
    permissions:
      contents: read
    uses: ./.github/workflows/ci-windows-installer.yml
    with:
      azure_signing_account: ${{ vars.AZURE_SIGNING_ACCOUNT }}
      azure_signing_cert_profile: ${{ vars.AZURE_SIGNING_CERT_PROFILE }}
      azure_signing_endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
      publish_release: ${{ needs.setup_release.outputs.publish_release == 'true' }}
      release_version: ${{ needs.setup_release.outputs.release_version }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  build_flatpak:
    name: Build Flatpak
    needs: setup_release
    permissions:
      contents: read
    uses: ./.github/workflows/ci-flatpak.yml
    with:
      release_commit: ${{ needs.setup_release.outputs.release_commit }}
      release_version: ${{ needs.setup_release.outputs.release_version }}

  coverage:
    name: Coverage
    if: >-
      always() &&
      !cancelled() &&
      startsWith(github.repository, 'LizardByte/')
    needs: test
    permissions:
      contents: read
    uses: ./.github/workflows/ci-coverage.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: Release
    if: >-
      needs.setup_release.outputs.publish_release == 'true' &&
      startsWith(github.repository, 'LizardByte/')
    needs:
      - setup_release
      - clippy
      - test
      - build
      - build_windows_installer
      - build_flatpak
    permissions:
      contents: read
    uses: ./.github/workflows/ci-release.yml
    with:
      release_body: ${{ needs.setup_release.outputs.release_body }}
      release_generate_release_notes: ${{ needs.setup_release.outputs.release_generate_release_notes }}
      release_tag: ${{ needs.setup_release.outputs.release_tag }}
    secrets:
      GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
