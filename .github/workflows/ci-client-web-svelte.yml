---
name: CI-Client-Web-Svelte
permissions: {}

on:
  pull_request:
    paths:
      - 'crates/client-web-svelte/**'
      - '.github/workflows/ci-client-web-svelte.yml'
  push:
    branches:
      - master
    paths:
      - 'crates/client-web-svelte/**'
      - '.github/workflows/ci-client-web-svelte.yml'
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  svelte:
    name: Svelte Client (${{ matrix.run }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        run:
          - check
          - lint
          - test
          - build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/client-web-svelte
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: crates/client-web-svelte/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check (svelte-check)
        if: matrix.run == 'check'
        run: npm run check

      - name: Lint (oxlint)
        if: matrix.run == 'lint'
        run: npm run lint:ci

      - name: Test (vitest)
        if: matrix.run == 'test'
        run: npm run test

      - name: Build
        if: matrix.run == 'build'
        run: npm run build

      - name: Upload build artifact
        if: matrix.run == 'build'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: error
          name: client-web-svelte-dist
          path: crates/client-web-svelte/dist
