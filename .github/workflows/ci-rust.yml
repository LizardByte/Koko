---
name: CI-Rust
permissions: {}

on:
  workflow_call:
    inputs:
      release_version:
        default: ''
        required: false
        type: string

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        run:
          - test
          - build
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
        include:
          - target: x86_64-unknown-linux-musl  # Alpine
            os: ubuntu-latest
            container: rust:1.96-alpine3.24
            cargo_features: '--no-default-features'
            shell: bash
            build_artifact_prefix: build-alpine
            build_artifact_path: artifacts
          - target: aarch64-unknown-linux-musl  # Alpine
            os: ubuntu-24.04-arm
            container: rust:1.96-alpine3.24
            cargo_features: '--no-default-features'
            shell: bash
            build_artifact_prefix: build-alpine
            build_artifact_path: artifacts
          - target: x86_64-unknown-linux-gnu  # Ubuntu
            os: ubuntu-latest
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-ubuntu
            build_artifact_path: artifacts
          - target: aarch64-unknown-linux-gnu  # Ubuntu
            os: ubuntu-24.04-arm
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-ubuntu
            build_artifact_path: artifacts
          - target: x86_64-apple-darwin  # macOS/Intel
            os: macos-latest
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-macos
            build_artifact_path: build-artifact
          - target: aarch64-apple-darwin  # macOS/Apple Silicon
            os: macos-latest
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-macos
            build_artifact_path: build-artifact
          - target: x86_64-pc-windows-msvc  # Windows
            os: windows-latest
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-windows
            build_artifact_path: build-artifact
          - target: aarch64-pc-windows-msvc  # Windows/ARM64
            os: windows-11-arm
            container: ''
            cargo_features: ''
            shell: bash
            build_artifact_prefix: build-windows
            build_artifact_path: build-artifact
        exclude:
          - run: test
            target: aarch64-pc-windows-msvc
    name: ${{ matrix.run == 'test' && 'Test' || 'Build' }} (${{ matrix.target }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    env:
      CARGO_TERM_COLOR: always
      INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - name: Fix arm64 Alpine container
        if: runner.arch == 'ARM64' && contains(matrix.container, 'alpine')
        uses: laverdet/alpine-arm64@7f0f72ee2f71eb2324e5888e8b6e42b1b53e6160  # v1.0.0

      - name: Prepare Alpine container
        if: contains(matrix.container, 'alpine')
        shell: sh
        run: |
          set -eux
          apk add --no-cache \
            bash \
            build-base \
            git \
            nodejs \
            npm \
            openssl-dev \
            openssl-libs-static \
            p7zip \
            pkgconf \
            zlib-dev \
            zlib-static

          echo "/usr/local/cargo/bin" >> "${GITHUB_PATH}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Ubuntu dependencies
        if: matrix.container == '' && contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            p7zip-full \
            pkg-config

      - name: Setup Rust
        if: matrix.container == ''
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          target: ${{ matrix.target }}
          cache: true
          cache-on-failure: false

      - name: Setup Node
        if: matrix.container == ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: crates/client-web/package-lock.json

      - name: Install Cargo tools
        if: matrix.run == 'test' || env.INPUT_RELEASE_VERSION != ''
        run: |
          cargo_run_bin_version="$(
            cargo metadata --locked --no-deps --format-version 1 \
              | sed -n 's/.*"cargo-run-bin"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'
          )"
          if [[ -z "${cargo_run_bin_version}" ]]; then
            echo "Failed to parse cargo-run-bin version from cargo metadata" >&2
            exit 1
          fi
          cargo install --locked cargo-run-bin --version "${cargo_run_bin_version}"
          if [[ -n "${INPUT_RELEASE_VERSION}" ]]; then
            cargo bin cargo-set-version --version
          fi
          if [[ "${{ matrix.run }}" == "test" ]]; then
            cargo bin cargo-tarpaulin --version
          fi

      - name: Update Version
        if: matrix.run == 'build' && env.INPUT_RELEASE_VERSION != ''
        run: |
          cargo bin cargo-set-version "${INPUT_RELEASE_VERSION}"
          cargo update --workspace
          cargo metadata --locked --no-deps --format-version 1 > /dev/null

      - name: Build web client
        working-directory: crates/client-web
        run: |
          npm ci --ignore-scripts
          npm run build

      - name: Test
        id: test
        if: matrix.run == 'test'
        run: |
          tarpaulin_args=()
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              tarpaulin_args+=(--jobs 1)
              ;;
          esac

          cargo bin cargo-tarpaulin \
            --locked \
            --color always \
            --engine llvm \
            "${tarpaulin_args[@]}" \
            --no-fail-fast \
            --out Xml \
            ${{ matrix.cargo_features }} \
            --target ${{ matrix.target }} \
            --verbose

      - name: Upload coverage artifact
        if: >-
          always() &&
          matrix.run == 'test' &&
          (steps.test.outcome == 'success' || steps.test.outcome == 'failure')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: error
          name: coverage-${{ matrix.target }}
          path: cobertura.xml

      - name: Build
        if: matrix.run == 'build'
        run: cargo build --locked ${{ matrix.cargo_features }} --target ${{ matrix.target }} --release

      - name: Create 7z archive
        if: matrix.run == 'build' && matrix.build_artifact_path == 'artifacts'
        run: |
          mkdir -p artifacts

          extension=""
          if [[ "${{ matrix.target }}" = *"windows"* ]]; then
            extension=".exe"
          fi

          7z a "./artifacts/koko-${{ matrix.target }}.7z" \
            "./assets" \
            "./target/${{ matrix.target }}/release/koko${extension}"

      - name: Prepare build artifact
        if: matrix.run == 'build' && matrix.build_artifact_path == 'build-artifact'
        run: |
          mkdir -p \
            "build-artifact/target/${{ matrix.target }}/release" \
            "build-artifact/crates/client-web"

          extension=""
          if [[ "${{ matrix.target }}" = *"windows"* ]]; then
            extension=".exe"
          fi

          cp \
            "target/${{ matrix.target }}/release/koko${extension}" \
            "build-artifact/target/${{ matrix.target }}/release/koko${extension}"
          cp -R "crates/client-web/dist" "build-artifact/crates/client-web/dist"

      - name: Upload build artifact
        if: matrix.run == 'build'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          if-no-files-found: error
          name: ${{ matrix.build_artifact_prefix }}-${{ matrix.target }}
          path: ${{ matrix.build_artifact_path }}
